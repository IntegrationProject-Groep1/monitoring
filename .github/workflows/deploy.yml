name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Must match the 'name' of your CI workflow exactly
    types:
      - completed

jobs:
  build-and-push:
    name: Build and Push Docker Image
    # Only deploy if CI was successful AND the trigger was a TAG (v*)
    if: >
      github.event.workflow_run.conclusion == 'success' && 
      (github.event.workflow_run.head_branch == null || 
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the exact commit SHA that passed the CI
          ref: ${{ github.event.workflow_run.head_sha }}

      # STEP: Force repository name to lowercase for Docker compatibility
      - name: Lowercase repo name
        id: repo_name
        run: echo "value=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags: ':latest' for Watchtower to pull, and ':SHA' for version tracking
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.value }}:latest
            ghcr.io/${{ steps.repo_name.outputs.value }}:${{ github.event.workflow_run.head_sha }}
