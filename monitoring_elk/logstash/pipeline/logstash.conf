input {
  rabbitmq {
    host => "mon-rabbitmq"
    port => 5672
    user => "monitoring"
    password => "monitoring123"
    queue => "heartbeat"
    durable => true
    codec => "plain"
  }
}

filter {
  xml {
    source => "message"
    target => "parsed"
    force_array => false
  }

  mutate {
    add_field => {
      "system" => "%{[parsed][system]}"
      "uptime" => "%{[parsed][uptime]}"
      "heartbeat_timestamp" => "%{[parsed][timestamp]}"
    }
    remove_field => ["parsed", "message"]
  }

  mutate {
    convert => { "uptime" => "integer" }
  }

  date {
    match => [ "heartbeat_timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://mon-elasticsearch:9200"]
    index => "heartbeats-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
