input {
  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "heartbeat"
    durable => true
    codec => "plain"
  }
}

filter {
  mutate {
    add_field => { "received_at" => "%{@timestamp}" }
  }

  xml {
    source => "message"
    target => "parsed"
    force_array => false
  }

  if "_xmlparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "xml_parse_failure" }
      add_tag => ["quarantine"]
    }
  } else {
    mutate {
      add_field => {
        "system" => "%{[parsed][system]}"
        "uptime_seconds" => "%{[parsed][uptime]}"
        "heartbeat_timestamp" => "%{[parsed][timestamp]}"
      }
      lowercase => ["system"]
      strip => ["system"]
    }

    # Known systems: planning, crm, kassa, facturatie, monitoring, frontend
    # Anything else goes to quarantine.
    if [system] not in ["planning", "crm", "kassa", "facturatie", "monitoring", "frontend"] {
      mutate {
        add_field => { "parse_error" => "unknown_system" }
        add_tag => ["quarantine", "unknown_system"]
      }
    }

    mutate {
      convert => { "uptime_seconds" => "integer" }
    }

    date {
      match => [ "heartbeat_timestamp", "ISO8601" ]
      target => "@timestamp"
      tag_on_failure => ["bad_heartbeat_timestamp"]
    }

    if "bad_heartbeat_timestamp" in [tags] {
      mutate {
        add_tag => ["quarantine"]
        add_field => { "parse_error" => "bad_heartbeat_timestamp" }
      }
    }

    # Keep only the 4 useful fields on clean documents.
    # Quarantine documents keep message and heartbeat_timestamp for debugging.
    if "quarantine" not in [tags] {
      mutate {
        remove_field => ["heartbeat_timestamp", "message", "@version"]
      }
    }
  }

  mutate {
    remove_field => ["parsed"]
  }
}

output {
  if "quarantine" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      user => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index => "heartbeats-quarantine-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      user => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index => "heartbeats-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => json_lines }
}
